name: Build qtermwidget wheels (cibuildwheel)

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        qt_version: ["6.9.0"]

    steps:
      - name: Set up Python (host)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache Qt Lib
        id: cache-qt-lib
        uses: actions/cache@v5
        with:
          path: Qt
          key: qt-${{ matrix.qt_version }}-lib

      - name: Install Qt Lib
        if: steps.cache-qt-lib.outputs.cache-hit != 'true'
        run: |
          python -m pip install aqtinstall
          aqt install-qt linux desktop ${{ matrix.qt_version }} --outputdir ${{ github.workspace }}/Qt
          aqt install-qt mac desktop ${{ matrix.qt_version }} --outputdir ${{ github.workspace }}/Qt

      - name: Checkout pyside6-qtermwidget
        uses: actions/checkout@v4
        with:
          path: pyside6-qtermwidget
          submodules: recursive
      
      - name: Generate pyproject.toml
        run: |
          python -m pip install jinja2-cli
          jinja2 pyproject.toml.jinja -D QT_VERSION="${{ matrix.qt_version }}" -o pyproject.toml

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBUILDWHEEL_WORKSPACE: ${{ github.workspace }}
        with:
          package-dir: ./pyside6-qtermwidget
          output-dir: ./wheelhouse
          # config-file: ./pyside6-qtermwidget/pyproject.toml

      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: qtermwidget-${{ matrix.os }}-qt${{ matrix.version }}
          path: wheelhouse/*.whl
