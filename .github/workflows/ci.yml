name: Build qtermwidget (PySide6)

on: [push, pull_request]

jobs:
  build_wheel:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python: [3.13]
        pyside6: [6.9.0]
        os: [macos-latest]

    steps:
      - name: Checkout pyside6-qtermwidget
        uses: actions/checkout@v4
        with:
          path: pyside6-qtermwidget
          submodules: recursive

      - name: Checkout qtermwidget
        uses: actions/checkout@v4
        with:
          repository: lxqt/qtermwidget
          ref: master
          path: qtermwidget

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Setup Qt vars
        run: |
          QT_VERSION=$(echo ${{ matrix.pyside6 }} | cut -d. -f-3)
          QT_BASE_DIR=${GITHUB_WORKSPACE}/Qt
          echo "QT_VERSION=$QT_VERSION" >> $GITHUB_ENV
          echo "QT_BASE_DIR=$QT_BASE_DIR" >> $GITHUB_ENV

      - name: Setup Qt compiler vars - Linux
        if: runner.os == 'Linux'
        run: |
          QT6_DIR=$QT_BASE_DIR/$QT_VERSION/gcc_64
          echo "QT6_DIR=$QT6_DIR" >> $GITHUB_ENV

      - name: Setup Qt compiler vars - macOS
        if: runner.os == 'macOS'
        run: |
          QT6_DIR=$QT_BASE_DIR/$QT_VERSION/macos
          echo "QT6_DIR=$QT6_DIR" >> $GITHUB_ENV

      - name: Install Qt6 using aqtinstall - Linux
        if: runner.os == 'Linux'
        run: |
          python -m pip install aqtinstall
          python -m aqt install-qt linux desktop ${{ env.QT_VERSION }} --outputdir ${{ env.QT_BASE_DIR }}

      - name: Install Qt6 using aqtinstall - macOS
        if: runner.os == 'macOS'
        run: |
          python -m pip install aqtinstall
          python -m aqt install-qt mac desktop ${{ env.QT_VERSION }} --outputdir ${{ env.QT_BASE_DIR }}

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake python3-dev libgl1-mesa-dev \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 \
            clang llvm libclang-dev

      - name: Install system dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake llvm

      - name: Install PySide6 and Shiboken6
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            PySide6==${{ matrix.pyside6 }} \
            shiboken6==${{ matrix.pyside6 }} \
            shiboken6_generator==${{ matrix.pyside6 }}

      - name: Build Python wheel
        run: |
          export Qt6_DIR=${{ env.QT6_DIR }}
          export QT6_INSTALL_DIR=${{ env.QT6_DIR }}

          cd pyside6-qtermwidget
          python -m pip install --upgrade build setuptools wheel scikit-build-core>=0.9
          python -m build --wheel --no-isolation

      - name: Test wheel
        run: |
          cd pyside6-qtermwidget
          python -m pip install dist/*.whl
          python -c "import qtermwidget; print(qtermwidget.__doc__)"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: qtermwidget-wheel-${{ matrix.python }}-pyside6-${{ matrix.pyside6 }}-${{ matrix.os }}
          path: pyside6-qtermwidget/dist/*.whl
