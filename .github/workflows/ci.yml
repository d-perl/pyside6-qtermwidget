name: Build qtermwidget wheels (cibuildwheel)

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        version: ["6.8.3", "6.9.0"]

    steps:
      - name: Checkout pyside6-qtermwidget
        uses: actions/checkout@v4
        with:
          path: pyside6-qtermwidget
          submodules: recursive

      - name: Checkout qtermwidget
        uses: actions/checkout@v4
        with:
          repository: lxqt/qtermwidget
          ref: master
          path: qtermwidget

      - name: Set up Python (host)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade cibuildwheel

      - name: Build wheels
        env:
          # ---------- single source of truth ----------
          QT_VERSION: ${{ matrix.version }}
          PYSIDE_VERSION: ${{ matrix.version }}
          QT_BASE_DIR: ${{ github.workspace }}/Qt

          # ---------- cibuildwheel ----------
          CIBW_BUILD: cp313-*
          CIBW_SKIP: "*musllinux*"
          CIBW_BUILD_VERBOSITY: 1

          # ---------- Qt + system deps ----------
          CIBW_BEFORE_ALL_LINUX: |
            # Install Python packages
            python -m pip install --upgrade pip
            python -m pip install aqtinstall

            # Install Qt
            python -m aqt install-qt linux desktop ${QT_VERSION} --outputdir ${QT_BASE_DIR}

            # Install system dependencies
            yum install -y mesa-libGL libxslt llvm clang clang-devel libxkbcommon-devel cmake

          CIBW_BEFORE_ALL_MACOS: |
            python -m pip install aqtinstall
            python -m aqt install-qt mac desktop ${QT_VERSION} --outputdir ${QT_BASE_DIR}
            brew install cmake llvm

          # ---------- Qt discovery ----------
          CIBW_ENVIRONMENT_LINUX: >
            Qt6_DIR=${QT_BASE_DIR}/${QT_VERSION}/gcc_64
            QT6_INSTALL_DIR=${QT_BASE_DIR}/${QT_VERSION}/gcc_64

          CIBW_ENVIRONMENT_MACOS: >
            Qt6_DIR=${QT_BASE_DIR}/${QT_VERSION}/macos
            QT6_INSTALL_DIR=${QT_BASE_DIR}/${QT_VERSION}/macos

          # ---------- Python deps ----------
          CIBW_BEFORE_BUILD: >
            pip install
            PySide6==${PYSIDE_VERSION}
            shiboken6==${PYSIDE_VERSION}
            shiboken6_generator==${PYSIDE_VERSION}
            scikit-build-core>=0.9
            build

          CIBW_TEST_COMMAND: >
            python -c "import qtermwidget; print(qtermwidget.__doc__)"

        run: |
          cd pyside6-qtermwidget
          python -m cibuildwheel --output-dir dist

      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: qtermwidget-${{ matrix.os }}-qt${{ matrix.version }}
          path: pyside6-qtermwidget/dist/*.whl
